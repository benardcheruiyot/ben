name: Auto TLS Fix for Kopa Mkopa

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-fix-www-tls.yml
      - tools/fix_mkopaji_www_tls_noninteractive.sh
  workflow_dispatch:
    inputs:
      domain:
        description: Primary domain
        required: false
        default: kopa.mkopaji.com
      www_domain:
        description: WWW domain
        required: false
        default: www.kopa.mkopaji.com
      email:
        description: Certificate email
        required: false
        default: admin@kopa.mkopaji.com
  schedule:
    - cron: '17 2 * * 1'

jobs:
  tls-fix:
    name: Repair TLS and verify HTTPS
    runs-on: ubuntu-latest
    env:
      DOMAIN: ${{ github.event.inputs.domain || 'kopa.mkopaji.com' }}
      WWW_DOMAIN: ${{ github.event.inputs.www_domain || 'www.kopa.mkopaji.com' }}
      CERT_EMAIL: ${{ github.event.inputs.email || 'admin@kopa.mkopaji.com' }}
      RUN_DEPLOY_AFTER_TLS: ${{ secrets.RUN_DEPLOY_AFTER_TLS }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          [ -n "${{ secrets.EC2_HOST }}" ] || (echo "Missing EC2_HOST" && exit 1)
          [ -n "${{ secrets.EC2_SSH_PRIVATE_KEY }}" ] || (echo "Missing EC2_SSH_PRIVATE_KEY" && exit 1)

      - name: Run TLS fix script via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: root
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set +e
            if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then
              AS_ROOT="sudo"
            else
              AS_ROOT=""
            fi
            SCRIPT_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/tools/fix_mkopaji_www_tls_noninteractive.sh"
            curl -fsSL "$SCRIPT_URL" -o /tmp/fix_mkopaji_www_tls_noninteractive.sh || true

            if [ -f /tmp/fix_mkopaji_www_tls_noninteractive.sh ]; then
              $AS_ROOT chmod +x /tmp/fix_mkopaji_www_tls_noninteractive.sh
              $AS_ROOT DOMAIN='${{ env.DOMAIN }}' WWW='${{ env.WWW_DOMAIN }}' EMAIL='${{ env.CERT_EMAIL }}' bash /tmp/fix_mkopaji_www_tls_noninteractive.sh || true
            fi

            if [ ! -f "/etc/letsencrypt/live/${{ env.DOMAIN }}/fullchain.pem" ]; then
              certbot certonly --standalone --non-interactive --agree-tos --email '${{ env.CERT_EMAIL }}' -d '${{ env.DOMAIN }}' || true
            fi

            if [ -f "/etc/letsencrypt/live/${{ env.DOMAIN }}/fullchain.pem" ] && [ -f "/etc/letsencrypt/live/${{ env.DOMAIN }}/privkey.pem" ]; then
              cat > /etc/nginx/sites-available/mkopaji.conf <<'NGINX_CONF'
server {
  listen 80;
  server_name kopa.mkopaji.com;
  return 301 https://kopa.mkopaji.com$request_uri;
}

server {
  listen 443 ssl;
  server_name kopa.mkopaji.com;

  root /var/www/html/kopesha-loan-app;
  index index.html index.htm;

  ssl_certificate /etc/letsencrypt/live/kopa.mkopaji.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/kopa.mkopaji.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  location / {
    try_files $uri $uri/ =404;
  }
}
NGINX_CONF
              ln -sf /etc/nginx/sites-available/mkopaji.conf /etc/nginx/sites-enabled/mkopaji.conf
              nginx -t && systemctl reload nginx
            fi

            exit 0

      - name: Verify from GitHub runner
        run: |
          set -euo pipefail
          python - <<'PY'
import os
import ssl
import tempfile
import sys

domain = os.environ["DOMAIN"]
pem = ssl.get_server_certificate((domain, 443))
tmp = tempfile.NamedTemporaryFile(delete=False, suffix='.pem')
tmp.write(pem.encode())
tmp.close()
info = ssl._ssl._test_decode_cert(tmp.name)
sans = [v for t, v in info.get('subjectAltName', []) if t == 'DNS']
print('certificate_san=', sans)
if domain not in sans:
    print(f"ERROR: certificate SAN does not include {domain}")
    sys.exit(1)
print("TLS certificate SAN check passed")
PY

      - name: Optional app redeploy
        if: ${{ env.RUN_DEPLOY_AFTER_TLS == 'true' }}
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: root
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then
              AS_ROOT="sudo"
            else
              AS_ROOT=""
            fi
            if [ -x /var/www/html/kopa-mkopaji/tools/deploy_kopa_mkopaji.sh ]; then
              $AS_ROOT /var/www/html/kopa-mkopaji/tools/deploy_kopa_mkopaji.sh
            else
              echo "Deploy script not found; skipping redeploy"
            fi

      - name: Slack alert on TLS failure
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        run: |
          set -euo pipefail
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ TLS auto-fix failed for '${{ env.DOMAIN }}'. Check workflow logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            '${{ env.SLACK_WEBHOOK_URL }}'
